# --------------------------------------------------------------------
# Orac Plugin Manifest
# Plugin: Home Assistant Integration
# Author: Clive Bostock
# --------------------------------------------------------------------

[plugin]
id = home_assistant
name = Home Assistant Integration
version = 1.0.0
entrypoint = plugin:HomeAssistantPlugin
description = Integrates Orac with Home Assistant for device sync and directive execution.

[capabilities]
# Capability syntax: <category>:<identifier>
provides = directive:home_automation, sync:home_assistant, state:home_assistant

[requirements]
requires_database = true
requires_network = true
requires_context = false
