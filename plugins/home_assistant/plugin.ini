[home_assistant]
# Active connection settings used by the managed Home Assistant service.
protocol = http
host = 192.168.1.203
port = 8123
verify_ssl = false
websocket_path = /api/websocket

# Home Assistant personal access tokens are stored encrypted in the plugin PAT
# vault, not in plugin.ini. Initialise with:
# bin/plugin-pat-mgr.sh --plugin home_assistant --set access_token

# Planned service controls. The first-pass service currently always performs
# startup sync when the enabled plugin service starts; this key is reserved for
# allowing startup sync to be disabled.
sync_on_startup = true

# Planned structural refresh controls. The current implementation performs the
# initial structural sync only; these keys are reserved for periodic refresh
# scheduling of areas, devices, entities and registry metadata.
structural_refresh_mode = hourly
structural_refresh_minutes = 60

# Planned websocket/event listener controls. The current service uses the
# WebSocket API for registry list commands, but does not yet run a long-lived
# Home Assistant event listener.
enable_websocket = true
ws_reconnect_seconds = 10

# Planned state polling fallback controls. The current implementation performs
# the initial state sync only; these keys are reserved for a fallback loop if
# websocket state events are disabled or unavailable.
enable_state_poll_fallback = false
state_poll_seconds = 120

# Planned plugin-local logging verbosity. Current logging follows Orac's
# service logger configuration.
log_level = INFO
