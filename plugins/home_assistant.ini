# --------------------------------------------------------------------
# Orac Plugin Runtime Configuration
# Plugin: Home Assistant
# --------------------------------------------------------------------

[plugin]
enabled = true

# --------------------------------------------------------------------
# Connectivity
# --------------------------------------------------------------------

protocol = http
host = 192.168.1.203
port = 8123

# REST base path (normally /api)
rest_path = /api

# WebSocket endpoint (normally /api/websocket)
websocket_path = /api/websocket

# If true, verify SSL certificates (set true if using https)
verify_ssl = false

# Name of environment variable holding long-lived HA token
access_token_env = ORAC_HA_TOKEN


# --------------------------------------------------------------------
# Synchronisation
# --------------------------------------------------------------------

# Perform full structural sync on startup
sync_on_startup = true

# Structural refresh mode:
#   manual   -> only via directive
#   hourly   -> every structural_refresh_minutes
#   daily    -> once per day
structural_refresh_mode = hourly

# Used when structural_refresh_mode = hourly
structural_refresh_minutes = 60


# --------------------------------------------------------------------
# State Updates
# --------------------------------------------------------------------

# Use WebSocket subscription for live state changes
enable_websocket = true

# Reconnect delay if websocket drops (seconds)
ws_reconnect_seconds = 10

# If websocket unavailable, fall back to periodic state polling
enable_state_poll_fallback = false
state_poll_seconds = 120


# --------------------------------------------------------------------
# Logging / Diagnostics
# --------------------------------------------------------------------

log_level = INFO
