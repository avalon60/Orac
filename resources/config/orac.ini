[global]
project_identifier = Orac
[service]
# Define which LLM service we are running against (e.g. lmstudio, ollama, openai)
llm_service_id = ollama
# Default model (LM Studio) - loaded at startup
# default_model_name = meta-llama-3.1-8b-instruct
# Default model (Ollama) - loaded at startup
# default_model_name = deepseek-r1:14b
# default_model_name = qwen3.5-64K:latest
default_model_name = llama3.1-64K
# LM Studio - port 1234
# service_url = http://localhost:1234
# Ollama - port 11434
service_url = http://localhost:11434 
# Default token budget for Ollama completions. If Ollama reports
# done_reason=length, Orac increases the budget and retries.
default_num_predict = 384
# Percentage increase applied to num_predict after a truncated response.
num_predict_incr_pct = 100

[database]
connection_name = orac-service

[client]
llm_timeout = 120
show_timestamp = false

[settings]
# Unless overridden by show_reasoning in the API JSON payload, we define whether or 
# not to strip reasoning narrative here.
strip_reasoning_tags = false

[context]
enable_context_history = true
keep_messages = 200
prune_every_n_turns = 50

# The enable_prompt_dump is for debug purposes and causes the context window prompt 
# data to be dumped to logs/_debug
enable_prompt_dump = false

# compress_old_sessions: summarise old turns (retention policy)
compress_old_sessions = yes 
# history_turn_pairs: number of (user+assistant) pairs to keep in context
history_turn_pairs = 24    

reply_language = English
system_prompt_policy_file = resources/config/orac_system_prompt.yaml

economy = normal            ; thrifty|normal|lavish
history_budget_tokens =     ; if set, overrides the per-mode default
history_budget_reserve = 300

# session_scope; user | user+client
session_scope = user
# normalize_client; strip ports/PIDs/UUIDs from client id
normalize_client = true

allow_external_session_id = false

# If the time between turns exceeds conversation_timeout, we start a new conversation.
# 0 disables rollover (e.g. set to 60 for 60  mins)
conversation_timeout = 60
# When a conversation times out and rolls over to a new one...
# archive_on_rollover; if true -> archive old conversation
archive_on_rollover = false 
# close_on_rollover; if true (and archive_on_rollover=false) -> close old conversation
close_on_rollover = true     


[vector_db]
# granularity:  e.g., none|chunk_2|chunk_3|sliding_3
granularity = chunk_3                
min_tokens = 10
skip_trivial = yes
max_size_gb = 250



[logging]
# Enable or disable log stamping (adds a timestamp-based ID to logs)
log_stamping = true

# Whether to include stderr output (true/false)
inc_stderr = true

# Default log level (TRACE, DEBUG, INFO, WARNING, ERROR, CRITICAL)
log_level = DEBUG

# Optional custom colours for log levels (if you use them)
supplementary = light-green
feature = cyan

[openai_gateway]
enabled = false
host = 127.0.0.1
port = 11435
require_api_key = true
api_key_env = ORAC_OPENAI_GATEWAY_API_KEY


[voice]
enabled = true
mode = local
tts_engine = piper
tts_voice = en_GB-southern_english_female-low
tts_voice_dir = ${ORAC_HOME}/var/voices/piper
stt_engine = faster_whisper
stt_model = base.en
stt_device = cpu
stt_compute_type = int8
stt_record_seconds = 5
stt_sample_rate = 16000
stt_input_device = default
session_exit_phrases = exit,quit,stop listening,goodbye
